<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HMH Class Simulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #f5f5f5; padding: 2rem; }
    .section-title { font-size: 18px; font-weight: 600; margin-bottom: 1rem; color: #111; }
    .classes-grid { display: flex; flex-direction: column; gap: 12px; max-width: 600px; }
    .class-card { background: white; border: 1px solid #e5e7eb; border-radius: 12px; padding: 1rem 1.25rem; }
    .card-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
    .avatar { width: 42px; height: 42px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .card-info { flex: 1; }
    .card-info .class-name { font-size: 15px; font-weight: 600; color: #111; }
    .card-info .subject { font-size: 13px; color: #6b7280; }
    .card-actions { display: flex; align-items: center; gap: 8px; }
    .btn-view { font-size: 13px; padding: 6px 14px; border-radius: 8px; border: 1px solid #d1d5db; background: white; color: #111; cursor: pointer; }
    .btn-view:hover { background: #f9fafb; }
    .card-footer { display: flex; align-items: center; gap: 8px; padding-top: 8px; border-top: 1px solid #f3f4f6; }
    .path-label { font-size: 12px; background: #EEF2FF; color: #4338CA; padding: 3px 10px; border-radius: 20px; font-weight: 500; }
    .info-badge { width: 18px; height: 18px; border-radius: 50%; background: #4338CA; color: white; font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; border: none; transition: transform 0.1s; }
    .info-badge:hover { transform: scale(1.15); }
    .partner-btn { display: flex; align-items: center; gap: 5px; font-size: 12px; color: #6b7280; background: none; border: none; cursor: pointer; padding: 3px 8px; border-radius: 8px; }
    .partner-btn:hover { background: #f3f4f6; }
    .partner-logo { font-size: 14px; font-weight: 700; color: #E63; }
  </style>
</head>
<body>

  <h2 class="section-title">My Classes</h2>
  <div class="classes-grid">

    <div class="MuiCard-root class-card">
      <div class="card-top">
        <div class="avatar" style="background:#FEF3C7;">📚</div>
        <div class="card-info">
          <div class="class-name">Grade 5 Math</div>
          <div class="subject">Mathematics</div>
        </div>
        <div class="card-actions">
          <button class="btn-view" data-testid="ViewClassButton-6761a122_7a3b-4a69-8896-cf26e9d7b4a5">View Class</button>
        </div>
      </div>
      <div class="card-footer">
        <span class="path-label">Personalized Path</span>
        <button class="info-badge" id="badge" title="Learn more">i</button>
        <button class="partner-btn">
          <span class="partner-logo">//</span> Classcraft
        </button>
      </div>
    </div>

    <div class="MuiCard-root class-card">
      <div class="card-top">
        <div class="avatar" style="background:#D1FAE5;">🔬</div>
        <div class="card-info">
          <div class="class-name">Sample Class</div>
          <div class="subject">Science</div>
        </div>
        <div class="card-actions">
          <button class="btn-view" data-testid="ViewClassButton-a8b2c3d4_1234-5678-abcd-ef0123456789">View Class</button>
        </div>
      </div>
      <div class="card-footer">
        <span class="path-label">Personalized Path</span>
        <button class="info-badge" id="badge" title="Learn more">i</button>
        <button class="partner-btn">
          <span class="partner-logo">//</span> Classcraft
        </button>
      </div>
    </div>

    <div class="MuiCard-root class-card">
      <div class="card-top">
        <div class="avatar" style="background:#FCE7F3;">📖</div>
        <div class="card-info">
          <div class="class-name">English Literature</div>
          <div class="subject">Language Arts</div>
        </div>
        <div class="card-actions">
          <button class="btn-view" data-testid="ViewClassButton-f9e8d7c6_abcd-ef12-3456-7890abcdef12">View Class</button>
        </div>
      </div>
      <div class="card-footer">
        <span class="path-label">Personalized Path</span>
        <button class="info-badge" id="badge" title="Learn more">i</button>
        <button class="partner-btn">
          <span class="partner-logo">//</span> Classcraft
        </button>
      </div>
    </div>

  </div>

  <!-- Pendo snippet goes here -->
    

</body>
</html>
